<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lio — Ashrah Painting Marketing Agent</title>
<style>
  :root {
    --bg: #0b0d10;
    --panel: #14181d;
    --panel-2: #1b2026;
    --border: #232a32;
    --text: #e6eaf0;
    --muted: #8a96a3;
    --accent: #f5b041;
    --accent-press: #d99427;
    --ok: #5fd084;
    --err: #ff6b6b;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background:var(--bg); color:var(--text); font:14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  a { color: var(--accent); }
  .app { display:grid; grid-template-columns: 260px 1fr; min-height:100vh; }
  aside {
    border-right:1px solid var(--border);
    background:var(--panel);
    padding:22px 18px;
    display:flex; flex-direction:column; gap:18px;
  }
  .brand {
    display:flex; align-items:baseline; gap:10px;
  }
  .brand .logo {
    font-size:24px; font-weight:800; letter-spacing:2px; color:var(--accent);
  }
  .brand .tag { font-size:11px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; }
  .nav { display:flex; flex-direction:column; gap:4px; margin-top:6px; }
  .nav button {
    text-align:left;
    background:transparent; color:var(--text);
    border:1px solid transparent; border-radius:8px;
    padding:10px 12px; cursor:pointer; font-size:13px;
    display:flex; flex-direction:column; gap:2px;
  }
  .nav button:hover { background:var(--panel-2); }
  .nav button.active { background:var(--panel-2); border-color:var(--border); }
  .nav .label { font-weight:600; }
  .nav .sub { font-size:11px; color:var(--muted); }
  .footer {
    margin-top:auto; padding-top:14px; border-top:1px solid var(--border);
    font-size:11px; color:var(--muted);
  }
  main { padding:28px 32px; max-width:1100px; }
  h1 { font-size:22px; margin:0 0 4px; }
  .hint { color:var(--muted); margin:0 0 22px; font-size:13px; }
  form { background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:20px; }
  .row { display:grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap:14px; }
  .row.full { grid-template-columns: 1fr; }
  label { display:flex; flex-direction:column; gap:6px; font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }
  input, select, textarea {
    background:var(--panel-2); color:var(--text);
    border:1px solid var(--border); border-radius:6px;
    padding:9px 11px; font:14px/1.4 -apple-system, BlinkMacSystemFont, sans-serif;
    outline:none;
  }
  input:focus, select:focus, textarea:focus { border-color:var(--accent); }
  textarea { resize:vertical; min-height:90px; }
  .actions { margin-top:16px; display:flex; gap:10px; align-items:center; }
  button.primary {
    background:var(--accent); color:#161616; border:none; border-radius:6px;
    padding:10px 18px; font-weight:700; cursor:pointer; letter-spacing:.5px;
  }
  button.primary:hover { background:var(--accent-press); }
  button.primary:disabled { opacity:.5; cursor:not-allowed; }
  button.ghost {
    background:transparent; color:var(--text); border:1px solid var(--border);
    border-radius:6px; padding:10px 14px; cursor:pointer;
  }
  .status { margin-left:auto; font-size:12px; color:var(--muted); }
  .status.ok { color:var(--ok); }
  .status.err { color:var(--err); }
  .output {
    margin-top:22px;
    background:var(--panel); border:1px solid var(--border); border-radius:10px;
    padding:18px; min-height:120px;
  }
  .output h2 { font-size:13px; margin:0 0 10px; color:var(--muted); text-transform:uppercase; letter-spacing:1.5px; }
  .output .meta { font-size:11px; color:var(--muted); margin-bottom:10px; }
  .output pre {
    margin:0; white-space:pre-wrap; word-break:break-word;
    font:13px/1.55 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    color:var(--text);
  }
  .output .empty { color:var(--muted); font-style:italic; }
  .copybar { display:flex; justify-content:flex-end; margin-bottom:8px; }
  .copybar button { font-size:11px; padding:5px 10px; }
  .modepick { display:flex; gap:8px; margin-bottom:14px; }
  .modepick button {
    flex:1; background:var(--panel-2); color:var(--text);
    border:1px solid var(--border); border-radius:6px;
    padding:9px 12px; cursor:pointer; font-weight:600;
  }
  .modepick button.active { background:var(--accent); color:#161616; border-color:var(--accent); }
  input[type="file"] { padding:7px 9px; }
  .image-grid {
    display:grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap:10px;
    margin-top:6px;
  }
  .image-card {
    background:var(--panel-2); border:1px solid var(--border); border-radius:8px;
    padding:8px; display:flex; flex-direction:column; gap:6px;
  }
  .image-card img { width:100%; height:auto; border-radius:4px; display:block; }
  .image-card .meta { font-size:11px; color:var(--muted); display:flex; justify-content:space-between; }
  .image-card a { color:var(--accent); text-decoration:none; font-size:11px; }
  .image-card a:hover { text-decoration:underline; }

  /* Pipeline */
  .pipe-bar { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:14px; }
  .pipe-bar input, .pipe-bar select { padding:8px 10px; }
  .pipe-bar input[type="search"] { flex:1; min-width:240px; }
  .pipe-stat { font-size:11px; color:var(--muted); margin-left:auto; letter-spacing:1px; text-transform:uppercase; }

  /* Card grid — robust at any iframe width. Auto-fills columns. */
  .pipe-cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 10px;
  }
  .pipe-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    cursor: pointer;
    transition: border-color .15s, transform .05s;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .pipe-card:hover { border-color: var(--accent); }
  .pipe-card.active { border-color: var(--accent); background: #1d2530; }
  .pipe-card .row1 { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .pipe-card .row1 .badge { flex-shrink: 0; }
  .pipe-card .row1 .spacer { flex: 1; }
  .pipe-card .pc-name { font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.2; }
  .pipe-card .pc-company { font-size: 12px; color: var(--muted); }
  .pipe-card .pc-title { font-size: 12px; color: #cbd5e1; }
  .pipe-card .pc-meta { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; font-size: 11px; color: var(--muted); margin-top: 2px; }
  .pipe-card .pc-meta .meta-item { display: flex; align-items: center; gap: 4px; }
  .pipe-card .pc-meta .meta-item b { color: #cbd5e1; font-weight: 600; }
  .pipe-card .pc-badges { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .pipe-card-empty {
    text-align: center; padding: 40px 20px; color: var(--muted);
    background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
  }
  .badge {
    display:inline-block; padding:2px 7px; border-radius:10px; font-size:10px;
    font-weight:700; letter-spacing:0.5px; text-transform:uppercase;
  }
  .badge.tier-1 { background:#3a2818; color:var(--accent); }
  .badge.tier-2 { background:#1f2a35; color:#79a2c4; }
  .badge.tier-3 { background:#1a1a1a; color:var(--muted); }
  .badge.seg    { background:#1a2620; color:#7fc28d; }
  .badge.draft  { background:#2a1f3a; color:#b394ff; }
  .badge.no-email { background:#3a1c1c; color:#ff8d8d; }
  .pipe-detail {
    margin-top:18px;
    background:var(--panel); border:1px solid var(--border); border-radius:10px;
    padding:18px; display:none;
  }
  .pipe-detail.open { display:block; }
  .pipe-detail h3 { margin:0 0 4px; font-size:18px; }
  .pipe-detail .meta { color:var(--muted); font-size:12px; margin-bottom:12px; }
  .pipe-detail .grid {
    display:grid; grid-template-columns: 1fr 1fr; gap:14px; margin-bottom:14px;
  }
  .pipe-detail label { gap:4px; }
  .pipe-detail .hooks { background:var(--panel-2); border:1px solid var(--border); border-radius:6px; padding:10px 12px; }
  .pipe-detail .hooks ul { margin:6px 0 0 18px; padding:0; }
  .pipe-detail .hooks li { margin:3px 0; }
  .pipe-detail .draft-block {
    background:var(--panel-2); border:1px solid var(--border); border-radius:6px; padding:12px;
    font:13px/1.55 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    white-space:pre-wrap; word-break:break-word; margin-top:8px;
  }
  .pipe-detail .actions-row { display:flex; gap:10px; align-items:center; margin-top:14px; }

  /* Rendered markdown — make output actually readable */
  #out.md { white-space: normal; font-family: inherit; font-size: 14px; line-height: 1.6; padding: 4px 2px; }
  #out.md h1 { font-size: 20px; margin: 0 0 12px; color: var(--text); font-weight: 800; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
  #out.md h2 { font-size: 17px; margin: 22px 0 10px; color: var(--text); font-weight: 800; }
  #out.md h3 { font-size: 14px; margin: 16px 0 6px; color: var(--accent); font-weight: 700; letter-spacing: .3px; text-transform: uppercase; }
  #out.md h4 { font-size: 13px; margin: 12px 0 4px; color: var(--text); font-weight: 700; }
  #out.md p { margin: 0 0 10px; }
  #out.md ul, #out.md ol { margin: 0 0 12px; padding-left: 22px; }
  #out.md li { margin-bottom: 4px; }
  #out.md strong { color: var(--text); font-weight: 700; }
  #out.md em { color: var(--muted); }
  #out.md code { background: var(--panel-2); padding: 1px 6px; border-radius: 4px; font-size: 12px; }
  #out.md pre { background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; overflow-x: auto; font-size: 12px; }
  #out.md blockquote { border-left: 3px solid var(--accent); margin: 10px 0; padding: 4px 0 4px 12px; color: var(--muted); }
  #out.md hr { border: none; border-top: 1px solid var(--border); margin: 18px 0; }
  #out.md a { color: var(--accent); text-decoration: none; }
  #out.md a:hover { text-decoration: underline; }
  #out.md table { border-collapse: collapse; width: 100%; margin: 10px 0; font-size: 13px; }
  #out.md th, #out.md td { border: 1px solid var(--border); padding: 6px 8px; text-align: left; }
  #out.md th { background: var(--panel-2); font-weight: 700; }
</style>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
</head>
<body>
<div class="app">
  <aside>
    <div class="brand">
      <div class="logo">LIO</div>
      <div class="tag">marketing agent</div>
    </div>
    <div class="nav" id="nav">
      <button data-cap="outbound" class="active">
        <span class="label">Outbound</span>
        <span class="sub">cold/warm sequences</span>
      </button>
      <button data-cap="content">
        <span class="label">Content</span>
        <span class="sub">LinkedIn / longform</span>
      </button>
      <button data-cap="market_intel">
        <span class="label">Market Intel</span>
        <span class="sub">recon a target</span>
      </button>
      <button data-cap="campaign">
        <span class="label">Campaign</span>
        <span class="sub">plan a push</span>
      </button>
      <button data-cap="competitive">
        <span class="label">Competitive</span>
        <span class="sub">us vs them</span>
      </button>
      <button data-cap="research">
        <span class="label">📚 Research</span>
        <span class="sub">proven plays from papers</span>
      </button>
      <button data-cap="images">
        <span class="label">Images</span>
        <span class="sub">create &amp; edit</span>
      </button>
      <button data-cap="pipeline">
        <span class="label">Pipeline</span>
        <span class="sub">CRM &amp; outreach</span>
      </button>
      <button data-cap="inbox">
        <span class="label">Inbox</span>
        <span class="sub">replies &amp; bounces</span>
      </button>
    </div>
    <div class="footer">
      Ashrah Group · Winnipeg HQ<br>
      "We run like a tech company. We paint like tradespeople."
    </div>
  </aside>

  <main>
    <h1 id="title">Outbound Outreach</h1>
    <p class="hint" id="hint">Personalized 4-touch sequence over 14 days. Returns JSON.</p>

    <form id="form"></form>

    <div class="output" id="output">
      <h2>Output</h2>
      <div class="meta" id="meta"></div>
      <div class="copybar" id="copybar" style="display:none;"><button class="ghost" id="copyBtn" type="button">Copy</button></div>
      <pre id="out" class="empty">Run a capability to see output here.</pre>
    </div>
  </main>
</div>

<script>
const FORMS = {
  outbound: {
    title: "Outbound Outreach",
    hint: "Personalized 4-touch sequence over 14 days. Returns JSON.",
    fields: [
      {name:"recipient_name", label:"Recipient name", type:"text", required:true, half:true},
      {name:"role",           label:"Role / title",   type:"text", required:true, half:true},
      {name:"company",        label:"Company",        type:"text", required:true, half:true},
      {name:"segment",        label:"Segment", type:"select", half:true, options:[
        ["GC","GC — multifamily / TI"],
        ["PM","Property manager"],
        ["Developer","Developer"],
        ["Hotel","Hotel ops"],
        ["Public","Public sector"],
      ]},
      {name:"city",           label:"City",           type:"text", half:true},
      {name:"known_email",    label:"Known email (optional)", type:"text", half:true},
      {name:"context",        label:"Context (recent project, mutual, trigger event)", type:"textarea", full:true},
    ],
  },
  content: {
    title: "Content Generation",
    hint: "LinkedIn = full draft. Longform = outline first.",
    fields: [
      {name:"format", label:"Format", type:"select", half:true, options:[["linkedin","LinkedIn"],["longform","Longform article"]]},
      {name:"theme",  label:"Theme",  type:"select", half:true, options:[
        ["AI in trades","AI in trades"],
        ["Operational excellence","Operational excellence"],
        ["Commercial painting craft","Commercial painting craft"],
      ]},
      {name:"topic", label:"Topic", type:"text", required:true, full:true},
      {name:"angle", label:"Angle (what's the take?)", type:"textarea", full:true},
    ],
  },
  market_intel: {
    title: "Market Intelligence",
    hint: "Recon brief. Anything unverified is flagged, not invented.",
    fields: [
      {name:"company", label:"Company", type:"text", required:true, half:true},
      {name:"type",    label:"Type", type:"select", half:true, options:[
        ["GC","GC"],["PM","Property manager"],["Developer","Developer"],["Hotel","Hotel"],
      ]},
      {name:"city", label:"City", type:"text", half:true},
      {name:"website", label:"Website (optional)", type:"text", half:true},
      {name:"context", label:"Known context", type:"textarea", full:true},
    ],
  },
  campaign: {
    title: "Campaign Plan",
    hint: "Pipeline-only metrics. Vanity metrics rejected.",
    fields: [
      {name:"goal",      label:"Goal", type:"textarea", required:true, full:true},
      {name:"timeframe", label:"Timeframe (e.g. 6 weeks)", type:"text", required:true, half:true},
      {name:"budget",    label:"Budget (optional)", type:"text", half:true},
      {name:"segment",   label:"Target segment", type:"select", half:true, options:[
        ["GC","GC — multifamily / TI"],
        ["PM","Property managers"],
        ["Developer","Developers"],
        ["Hotel","Hotels"],
        ["Public","Public sector"],
        ["Mixed","Mixed"],
      ]},
      {name:"geography", label:"Geography", type:"text", half:true},
    ],
  },
  competitive: {
    title: "Competitive Analysis",
    hint: "Specific. Unflattering where warranted. Flags need-verification claims.",
    fields: [
      {name:"competitors",   label:"Competitors (one per line)", type:"textarea", required:true, full:true},
      {name:"market_focus",  label:"Market focus (optional)",    type:"text", full:true},
    ],
  },
  research: {
    title: "📚 Research — proven B2B plays",
    hint: "Pulls open-access marketing/sales papers, extracts the evidence, and tells Lio exactly what to test for Ashrah. Takes 2-4 minutes.",
    custom: true,
  },
  images: {
    title: "Images — Create & Edit",
    hint: "Create from a prompt, or edit a source image. Powered by Gemini.",
    custom: true,
  },
  pipeline: {
    title: "Pipeline — CRM",
    hint: "Every contact in one place. Click a row to view + edit. Drafts attached where they exist.",
    custom: true,
  },
  inbox: {
    title: "Inbox — Replies & Bounces",
    hint: "Lio reads lio.ashrah@ashrahpainting.ca via IMAP. Sync pulls new mail, matches to CRM contacts, flags bounces.",
    custom: true,
  },
};

const formEl   = document.getElementById("form");
const titleEl  = document.getElementById("title");
const hintEl   = document.getElementById("hint");
const outEl    = document.getElementById("out");
const metaEl   = document.getElementById("meta");
const copyBar  = document.getElementById("copybar");
const copyBtn  = document.getElementById("copyBtn");

let activeCap = "outbound";

let imagesMode = "generate";

function renderForm(cap){
  const cfg = FORMS[cap];
  titleEl.textContent = cfg.title;
  hintEl.textContent  = cfg.hint;

  if (cfg.custom && cap === "pipeline") {
    renderPipeline();
    return;
  }

  if (cfg.custom && cap === "inbox") {
    renderInbox();
    return;
  }

  if (cfg.custom && cap === "research") {
    formEl.innerHTML = `
      <div class="row full">
        <label>What should Lio research? *
          <textarea name="query" required placeholder="e.g. B2B cold email personalization response rate experiments
or: account-based marketing for construction services
or: how often to follow up on a commercial sales lead"></textarea>
        </label>
      </div>
      <div class="row">
        <label>PDFs to read
          <select name="pdf_limit">
            <option value="4">4 — fastest (~2 min)</option>
            <option value="6" selected>6 — balanced (~3 min)</option>
            <option value="8">8 — thorough (~4 min)</option>
            <option value="12">12 — deep dive (~6 min)</option>
          </select>
        </label>
        <label>Search depth
          <select name="search_limit">
            <option value="20">20 candidate papers</option>
            <option value="25" selected>25 candidate papers</option>
            <option value="40">40 candidate papers</option>
          </select>
        </label>
      </div>
      <div class="row full" style="font-size:12px;color:var(--muted);line-height:1.5;">
        <strong>How it works:</strong>
        <ol style="margin:6px 0 0 18px;padding:0;">
          <li>Searches OpenAlex (200M+ papers) for marketing/sales research matching your query, filters to open-access</li>
          <li>Downloads each PDF, extracts text with PyMuPDF</li>
          <li>Hands the bundle to Claude with strict instructions: prefer RCTs, peer-reviewed journals, large-N studies. Refuse to bluff if evidence is thin.</li>
          <li>Returns proven strategies, evidence strength, citations, and concrete actions Lio should take for Ashrah</li>
        </ol>
      </div>
      <div class="actions">
        <button class="primary" type="submit">Run Research</button>
        <button class="ghost" type="reset">Reset</button>
        <span class="status" id="status"></span>
      </div>
    `;
    return;
  }

  if (cfg.custom && cap === "images") {
    formEl.innerHTML = `
      <div class="modepick" id="modepick">
        <button type="button" data-mode="generate" class="${imagesMode==='generate'?'active':''}">Create</button>
        <button type="button" data-mode="edit" class="${imagesMode==='edit'?'active':''}">Edit</button>
      </div>
      <div class="row full">
        <label>Prompt *<textarea name="prompt" required placeholder="${imagesMode==='generate'?'Describe the marketing image you want.':'Describe the change to make to the source image.'}"></textarea></label>
      </div>
      <div class="row full" id="sourceRow" style="${imagesMode==='edit'?'':'display:none;'}">
        <label>Source image *<input type="file" name="source" accept="image/*"></label>
      </div>
      <div class="actions">
        <button class="primary" type="submit">Run</button>
        <button class="ghost" type="reset">Reset</button>
        <span class="status" id="status"></span>
      </div>
    `;
    document.getElementById("modepick").addEventListener("click", e => {
      const b = e.target.closest("button[data-mode]");
      if (!b) return;
      imagesMode = b.dataset.mode;
      renderForm("images");
      resetOutput();
    });
    return;
  }

  const halves = [];
  const fulls  = [];
  cfg.fields.forEach(f => (f.full ? fulls : halves).push(f));

  let html = "";
  for (let i = 0; i < halves.length; i += 2) {
    html += `<div class="row">${fieldHtml(halves[i])}${halves[i+1] ? fieldHtml(halves[i+1]) : ""}</div>`;
  }
  for (const f of fulls) html += `<div class="row full">${fieldHtml(f)}</div>`;

  html += `<div class="actions">
    <button class="primary" type="submit">Run</button>
    <button class="ghost" type="reset">Reset</button>
    <span class="status" id="status"></span>
  </div>`;

  formEl.innerHTML = html;
}

function fieldHtml(f){
  if (f.type === "textarea") {
    return `<label>${f.label}${f.required?" *":""}<textarea name="${f.name}" ${f.required?"required":""}></textarea></label>`;
  }
  if (f.type === "select") {
    const opts = f.options.map(([v,t]) => `<option value="${v}">${t}</option>`).join("");
    return `<label>${f.label}<select name="${f.name}">${opts}</select></label>`;
  }
  return `<label>${f.label}${f.required?" *":""}<input type="${f.type}" name="${f.name}" ${f.required?"required":""}></label>`;
}

function setActive(cap){
  activeCap = cap;
  document.querySelectorAll("#nav button").forEach(b => {
    b.classList.toggle("active", b.dataset.cap === cap);
  });
  renderForm(cap);
  resetOutput();
}

function resetOutput(){
  outEl.textContent = "Run a capability to see output here.";
  outEl.classList.add("empty");
  outEl.classList.remove("md");
  metaEl.textContent = "";
  copyBar.style.display = "none";
}

// Render Claude's markdown output as actual HTML so headers, bullets, bold,
// and lists display properly instead of as raw `##` / `**` / `-` symbols.
function renderMarkdownOutput(text) {
  outEl.classList.remove("empty");
  outEl.classList.add("md");
  const raw = String(text || "");
  // Stash the raw markdown so Copy can hand back the source, not the
  // stripped-text version that innerHTML rendering produces.
  outEl.dataset.rawMarkdown = raw;
  if (window.marked && typeof window.marked.parse === "function") {
    try {
      window.marked.use({ gfm: true, breaks: false });
      outEl.innerHTML = window.marked.parse(raw);
      return;
    } catch (e) {
      // Fall through to plain rendering on parse error
    }
  }
  // Fallback: if marked failed to load (offline / CDN block), show plain text
  outEl.classList.remove("md");
  outEl.textContent = raw;
}

formEl.addEventListener("submit", async e => {
  e.preventDefault();
  const status = document.getElementById("status");
  const submit = formEl.querySelector("button.primary");
  status.textContent = "running…";
  status.className = "status";
  submit.disabled = true;

  try {
    let data;
    if (activeCap === "images") {
      const fd = new FormData(formEl);
      fd.append("mode", imagesMode);
      const res = await fetch("api/images", {method: "POST", body: fd});
      data = await res.json();
    } else if (activeCap === "research") {
      const fd = new FormData(formEl);
      const payload = {
        query: (fd.get("query") || "").toString().trim(),
        pdf_limit: parseInt(fd.get("pdf_limit") || "6", 10),
        search_limit: parseInt(fd.get("search_limit") || "25", 10),
      };
      status.textContent = "searching papers… (this takes 2-4 minutes)";
      const res = await fetch("api/research", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(payload),
      });
      data = await res.json();
    } else {
      const fd = new FormData(formEl);
      const payload = {};
      for (const [k,v] of fd.entries()) {
        const trimmed = (v || "").toString().trim();
        if (trimmed) payload[k] = trimmed;
      }
      if (activeCap === "competitive" && payload.competitors) {
        payload.competitors = payload.competitors.split(/\r?\n/).map(s => s.trim()).filter(Boolean);
      }
      const res = await fetch("api/run", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({capability: activeCap, payload}),
      });
      data = await res.json();
    }
    if (!data.ok) throw new Error(data.error || "unknown error");

    const r = data.result;
    if (activeCap === "research") {
      metaEl.textContent = `research · ${r.papers_included}/${r.papers_considered} papers used · ${new Date(r.generated_at).toLocaleString()} · log: ${r.log_path || '—'}`;
      renderResearch(r);
      copyBar.style.display = "none";
    } else {
      const costPart = (r.cost_usd != null)
        ? ` · 💵 $${Number(r.cost_usd).toFixed(3)}${r.usage ? ` (${r.usage.input_tokens||0} in / ${r.usage.output_tokens||0} out${r.usage.web_searches ? ' · ' + r.usage.web_searches + ' searches' : ''})` : ''}`
        : "";
      const crmPart = (r.crm_summary && (r.crm_summary.created || r.crm_summary.updated || r.crm_summary.unchanged))
        ? ` · 📇 CRM: +${r.crm_summary.created} new / ${r.crm_summary.updated} updated / ${r.crm_summary.unchanged} unchanged`
        : "";
      metaEl.textContent = `${r.capability}${r.mode?" · "+r.mode:""} · ${new Date(r.timestamp).toLocaleString()} · log: ${r.log_path}${costPart}${crmPart}`;
      if (activeCap === "images") {
        renderImages(r);
        copyBar.style.display = "none";
      } else {
        renderMarkdownOutput(r.output);
        copyBar.style.display = "flex";
      }
    }
    status.textContent = "done";
    status.className = "status ok";
  } catch (err) {
    outEl.innerHTML = "";
    outEl.textContent = "ERROR: " + err.message;
    outEl.classList.remove("empty");
    metaEl.textContent = "";
    copyBar.style.display = "none";
    status.textContent = "failed";
    status.className = "status err";
  } finally {
    submit.disabled = false;
  }
});

function renderResearch(r){
  outEl.classList.remove("empty");
  outEl.textContent = "";
  outEl.style.whiteSpace = "normal";

  const wrap = document.createElement("div");
  wrap.style.cssText = "display:flex;flex-direction:column;gap:18px;font-size:14px;line-height:1.55;";

  const f = r.findings || {};
  if (f.parse_error) {
    const pre = document.createElement("pre");
    pre.style.whiteSpace = "pre-wrap";
    pre.textContent = f.raw_text || JSON.stringify(f, null, 2);
    wrap.appendChild(pre);
    outEl.appendChild(wrap);
    return;
  }

  // Summary card
  if (f.summary) {
    const sumCard = document.createElement("div");
    sumCard.style.cssText = "background:var(--panel-2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;";
    sumCard.innerHTML = `<div style="font-size:11px;font-weight:700;letter-spacing:.6px;color:var(--muted);margin-bottom:6px;">EXECUTIVE SUMMARY</div><div>${escapeHtml(f.summary)}</div>`;
    wrap.appendChild(sumCard);
  }

  // Findings list
  const findings = Array.isArray(f.findings) ? f.findings : [];
  if (findings.length) {
    const findingsTitle = document.createElement("div");
    findingsTitle.style.cssText = "font-size:11px;font-weight:700;letter-spacing:.6px;color:var(--muted);margin-bottom:-6px;";
    findingsTitle.textContent = `PROVEN PLAYS (${findings.length})`;
    wrap.appendChild(findingsTitle);

    findings.forEach((x, i) => {
      const card = document.createElement("div");
      const strength = (x.evidence_strength || "weak").toLowerCase();
      const strengthColor = strength === "strong" ? "#2e7d32"
                          : strength === "moderate" ? "#bf6f00"
                          : "#888";
      card.style.cssText = `background:var(--panel-2);border:1px solid var(--border);border-left:4px solid ${strengthColor};border-radius:10px;padding:14px 16px;`;
      const srcs = (x.sources || []).slice(0, 3).map(s =>
        `<div style="font-size:12px;color:var(--muted);">📄 ${escapeHtml(s.title || '')} — ${escapeHtml(s.authors || '')} (${s.year || '?'}${s.venue ? ', ' + escapeHtml(s.venue) : ''})</div>`
      ).join("");
      card.innerHTML = `
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
          <span style="font-size:10px;font-weight:800;letter-spacing:.5px;background:${strengthColor};color:#fff;padding:2px 8px;border-radius:10px;">${strength.toUpperCase()}</span>
          <span style="font-size:11px;color:var(--muted);">#${i+1}</span>
        </div>
        <div style="font-size:15px;font-weight:600;margin-bottom:8px;">${escapeHtml(x.claim || '')}</div>
        <div style="font-size:13px;color:#bbb;margin-bottom:8px;"><b style="color:#ddd;">What the data shows:</b> ${escapeHtml(x.what_the_data_shows || '')}</div>
        <div style="font-size:13px;color:#bbb;margin-bottom:8px;"><b style="color:#ddd;">Why it applies to Ashrah:</b> ${escapeHtml(x.applies_to_ashrah_because || '')}</div>
        <div style="background:rgba(255,200,90,.08);border:1px solid rgba(255,200,90,.25);border-radius:6px;padding:8px 10px;font-size:13px;margin-bottom:8px;">
          <b style="color:#ffc85a;">→ Concrete action:</b> ${escapeHtml(x.concrete_action || '')}
        </div>
        ${srcs}
      `;
      wrap.appendChild(card);
    });
  }

  // What to test first
  const tests = Array.isArray(f.what_we_should_test_first) ? f.what_we_should_test_first : [];
  if (tests.length) {
    const testCard = document.createElement("div");
    testCard.style.cssText = "background:rgba(120,200,140,.08);border:1px solid rgba(120,200,140,.3);border-radius:10px;padding:14px 16px;";
    testCard.innerHTML = `<div style="font-size:11px;font-weight:700;letter-spacing:.6px;color:#9eda9e;margin-bottom:8px;">🧪 TEST THESE FIRST</div>` +
      `<ol style="margin:0;padding-left:18px;">` +
      tests.map(t => `<li style="margin-bottom:4px;">${escapeHtml(t)}</li>`).join("") +
      `</ol>`;
    wrap.appendChild(testCard);
  }

  // Caveats
  if (f.caveats) {
    const cav = document.createElement("div");
    cav.style.cssText = "background:rgba(255,150,120,.06);border:1px solid rgba(255,150,120,.25);border-radius:10px;padding:12px 14px;font-size:13px;color:#ddd;";
    cav.innerHTML = `<div style="font-size:11px;font-weight:700;letter-spacing:.6px;color:#ffaa88;margin-bottom:6px;">⚠ HONEST CAVEATS</div>${escapeHtml(f.caveats)}`;
    wrap.appendChild(cav);
  }

  // Sources used (collapsible)
  const usedMeta = (r.sources_meta || []).filter(m => m.status === "included");
  const skippedMeta = (r.sources_meta || []).filter(m => m.status !== "included");
  if (usedMeta.length || skippedMeta.length) {
    const det = document.createElement("details");
    det.style.cssText = "border:1px solid var(--border);border-radius:10px;padding:8px 12px;font-size:12px;color:var(--muted);";
    let inner = `<summary style="cursor:pointer;font-weight:600;">📚 Sources (${usedMeta.length} used / ${skippedMeta.length} skipped)</summary><div style="margin-top:10px;">`;
    if (usedMeta.length) {
      inner += `<div style="color:#9eda9e;font-weight:600;margin-bottom:4px;">✓ Used:</div>`;
      inner += usedMeta.map(m => `<div style="margin-bottom:6px;">[${m.year || '?'}] ${escapeHtml(m.title || '')} — ${escapeHtml(m.authors || '')}${m.url ? ` <a href="${m.url}" target="_blank" style="color:#7aa8ff;">link</a>` : ''}</div>`).join("");
    }
    if (skippedMeta.length) {
      inner += `<div style="color:#ff9988;font-weight:600;margin:10px 0 4px;">✗ Skipped:</div>`;
      inner += skippedMeta.map(m => `<div style="margin-bottom:4px;opacity:.7;">[${m.status}] ${escapeHtml(m.title || '')}</div>`).join("");
    }
    inner += `</div>`;
    det.innerHTML = inner;
    wrap.appendChild(det);
  }

  outEl.appendChild(wrap);
}

function escapeHtml(s) {
  if (s == null) return "";
  return String(s).replace(/[&<>"']/g, c => ({
    "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"
  })[c]);
}

function renderImages(r){
  outEl.classList.remove("empty");
  outEl.textContent = "";
  const wrap = document.createElement("div");

  if (r.model_text) {
    const note = document.createElement("div");
    note.style.marginBottom = "10px";
    note.style.fontSize = "12px";
    note.style.color = "var(--muted)";
    note.textContent = r.model_text;
    wrap.appendChild(note);
  }

  if (!r.images || r.images.length === 0) {
    const empty = document.createElement("div");
    empty.textContent = "Model returned no image. Try a more specific prompt.";
    empty.style.color = "var(--muted)";
    wrap.appendChild(empty);
  } else {
    const grid = document.createElement("div");
    grid.className = "image-grid";
    r.images.forEach((img, i) => {
      const card = document.createElement("div");
      card.className = "image-card";
      const url = img.url + "?t=" + Date.now();
      const kb = Math.round(img.bytes / 1024);
      card.innerHTML = `
        <img src="${url}" alt="output ${i+1}">
        <div class="meta">
          <span>${img.mime} · ${kb} KB</span>
          <a href="${img.url}" download>download</a>
        </div>
      `;
      grid.appendChild(card);
    });
    wrap.appendChild(grid);
  }
  outEl.appendChild(wrap);
}

async function loadPipeline(){
  try {
    const res = await fetch("api/crm/contacts");
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || "load failed");
    pipeContacts = data.contacts || [];
    pipeStatuses = (data.summary && data.summary.valid_statuses) || [];
    const sel = document.getElementById("pipeStatus");
    if (sel) {
      sel.innerHTML = `<option value="">All statuses</option>` +
        pipeStatuses.map(s => `<option value="${s}">${s}</option>`).join("");
    }
    renderPipeRows();
  } catch (err) {
    document.getElementById("pipeBody").innerHTML = `<div class="pipe-card-empty" style="color:var(--err);">ERROR: ${err.message}</div>`;
  }
}

function pipeFilterMatch(c){
  const f = pipeFilters;
  if (f.segment && c.segment !== f.segment) return false;
  if (f.status && c.status !== f.status) return false;
  if (f.tier && String(c.tier) !== f.tier) return false;
  if (f.q) {
    const q = f.q.toLowerCase();
    const blob = [c.name, c.company, c.title, c.email,
                  ...((c.personalization && c.personalization.hooks) || [])].join(" ").toLowerCase();
    if (!blob.includes(q)) return false;
  }
  return true;
}

function renderPipeRows(){
  const container = document.getElementById("pipeBody");
  if (!container) return;
  const rows = pipeContacts.filter(pipeFilterMatch);
  document.getElementById("pipeStat").textContent = `${rows.length} of ${pipeContacts.length}`;

  if (!rows.length){
    container.innerHTML = `<div class="pipe-card-empty">no matches</div>`;
    return;
  }
  container.innerHTML = rows.map(c => {
    const tierBadge = `<span class="badge tier-${c.tier||3}">T${c.tier||"-"}</span>`;
    const segBadge  = `<span class="badge seg">${c.segment||"?"}</span>`;
    const draft     = c.draft_email_path ? `<span class="badge draft">DRAFT</span>` : "";
    const noEmail   = c.email ? "" : `<span class="badge no-email">NO EMAIL</span>`;
    const flagCount = (c.needs_review_flags||[]).length;
    const flagDot   = flagCount ? `<span class="badge no-email">${flagCount} FLAG${flagCount>1?'S':''}</span>` : "";
    const last      = c.last_contacted || "—";
    const isActive  = c.id === pipeSelectedId ? "active" : "";

    return `
      <div class="pipe-card ${isActive}" data-id="${c.id}">
        <div class="row1">
          ${tierBadge}${segBadge}
          <span class="spacer"></span>
          <div class="pc-badges">${draft}${noEmail}${flagDot}</div>
        </div>
        <div class="pc-name" title="${escapeHtml(c.name||"")}">${escapeHtml(c.name||"")}</div>
        <div class="pc-company" title="${escapeHtml(c.company||"")}">${escapeHtml(c.company||"")}</div>
        ${c.title ? `<div class="pc-title" title="${escapeHtml(c.title)}">${escapeHtml(c.title)}</div>` : ""}
        <div class="pc-meta">
          <span class="meta-item"><b>Status:</b> ${escapeHtml(c.status||"—")}</span>
          ${c.email ? `<span class="meta-item">✉ ${escapeHtml(c.email)}</span>` : ""}
          <span class="meta-item">Last: ${escapeHtml(last)}</span>
        </div>
      </div>
    `;
  }).join("");

  container.querySelectorAll(".pipe-card").forEach(card => {
    card.addEventListener("click", () => openPipeDetail(card.dataset.id));
  });
}

function escapeHtml(s){
  return (s||"").toString()
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

    </div>

    ${hasDraft ? `<div style="margin-top:14px;"><strong>Draft email attached</strong><div class="draft-block" id="dDraftBlock">loading draft…</div></div>` : ""}

  metaEl.textContent = "";
  copyBar.style.display = "none";

  document.getElementById("inbSync").addEventListener("click", () => runInbox(true));
  document.getElementById("inbPeek").addEventListener("click", () => runInbox(false));
}

async function runInbox(applyToCrm){
  const stat = document.getElementById("inbStat");
  const sumEl = document.getElementById("inbSummary");
  const tbody = document.getElementById("inbBody");
  stat.textContent = applyToCrm ? "syncing…" : "peeking…";
  stat.className = "pipe-stat";
  tbody.innerHTML = `<tr><td colspan="5" style="padding:20px;color:var(--muted);">…</td></tr>`;
  const onlyUnseen = document.getElementById("inbUnseenOnly").checked;

  try {
    if (applyToCrm) {
      const res = await fetch("api/mailer/inbox/sync", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({limit:50, only_unseen:onlyUnseen}),
      });
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || "sync failed");
      const s = data.summary || {};
      sumEl.style.display = "block";
      sumEl.innerHTML = `<strong>Sync result:</strong>
        fetched ${s.fetched||0} ·
        replies matched <span style="color:var(--ok);">${s.replies_matched||0}</span> ·
        bounces matched <span style="color:var(--err);">${s.bounces_matched||0}</span> ·
        unmatched ${s.unmatched||0} ·
        skipped (already seen) ${s.skipped_seen||0} ·
        newly processed ${s.newly_processed||0}`;
      stat.textContent = "synced"; stat.className = "pipe-stat ok";
      renderInboxEvents(data.events || []);
    } else {
      const res = await fetch("api/mailer/inbox/peek?only_unseen=" + (onlyUnseen?"true":"false") + "&limit=25");
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || "peek failed");
      sumEl.style.display = "block";
      sumEl.innerHTML = `<strong>Peeked:</strong> ${data.count||0} message${data.count===1?"":"s"} (read-only — CRM not touched)`;
      stat.textContent = "peeked"; stat.className = "pipe-stat ok";
      // Convert peek messages to event-shaped rows
      const events = (data.messages||[]).map(m => ({
        kind: m.kind,
        from: m.from_email,
        subject: m.subject,
        date: m.date,
        preview: (m.body||"").slice(0,300),
        matched_contact_id: null,
      }));
      renderInboxEvents(events);
    }
  } catch (err) {
    tbody.innerHTML = `<tr><td colspan="5" style="padding:20px;color:var(--err);">ERROR: ${escapeHtml(err.message)}</td></tr>`;
    stat.textContent = "failed"; stat.className = "pipe-stat err";
    sumEl.style.display = "none";
  }
}

function renderInboxEvents(events){
  const tbody = document.getElementById("inbBody");
  if (!events.length){
    tbody.innerHTML = `<tr><td colspan="5" style="padding:20px;color:var(--muted);">no new messages</td></tr>`;
    return;
  }
  tbody.innerHTML = events.map(ev => {
    const kindClass = ev.kind === "bounce" ? "no-email" : (ev.kind === "reply" ? "seg" : "tier-3");
    const kindLabel = (ev.kind || "").toUpperCase();
    const matched = ev.matched_contact_id
      ? `<span class="badge tier-1">${escapeHtml(ev.contact_name || ev.matched_contact_id)}</span>`
      : (ev.bounced_email
          ? `<div class="sub">bounced: ${escapeHtml(ev.bounced_email)}</div>`
          : `<div class="sub">unmatched</div>`);
    const status = ev.new_status && ev.new_status !== ev.old_status
      ? ` <span class="badge draft">${escapeHtml(ev.old_status || "?")} → ${escapeHtml(ev.new_status)}</span>`
      : "";
    return `
      <tr>
        <td><span class="badge ${kindClass}">${kindLabel}</span></td>
        <td>
          <div class="sub">${escapeHtml(ev.from || "")}</div>
          <div class="name">${escapeHtml(ev.subject || "(no subject)")}</div>
        </td>
        <td>${matched}${status}</td>
        <td><div class="sub">${escapeHtml((ev.date || "").split("T")[0])}</div></td>
        <td><div class="sub" style="max-width:380px;">${escapeHtml((ev.preview || "").slice(0, 200))}</div></td>
      </tr>
    `;
  }).join("");
}

async function sendPipeContact(id, dryRun){
  const c = pipeContacts.find(x => x.id === id);
  if (!c) return;
  const msg = document.getElementById("dStatusMsg");
  const liveBtn = document.getElementById("dSend");
  const dryBtn = document.getElementById("dSendDry");

  if (!dryRun){
    const ok = confirm(`Send live email to ${c.name} <${c.email}>?\n\nSubject: ${(c.draft_email_path ? "(loaded above)" : "(no draft)")}\n\nThis will deliver the email and mark status = Contacted.`);
    if (!ok) return;
  }

  msg.textContent = dryRun ? "running dry-run…" : "sending…";
  msg.className = "status";
  if (liveBtn) liveBtn.disabled = true;
  if (dryBtn) dryBtn.disabled = true;

  try {
    const res = await fetch("api/crm/send/" + encodeURIComponent(id), {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({dry_run: dryRun}),
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || "send failed");
    if (dryRun){
      msg.textContent = `dry run ok · log: ${data.result.log_path||""}`;
      msg.className = "status ok";
    } else {
      msg.textContent = `sent · message_id: ${data.result.message_id||""}`;
      msg.className = "status ok";
      // refresh contact
      const r = await fetch("api/crm/contact/" + encodeURIComponent(id));
      const cd = await r.json();
      if (cd.ok){
        const idx = pipeContacts.findIndex(x => x.id === id);
        if (idx >= 0) pipeContacts[idx] = cd.contact;
        renderPipeRows();
      }
    }
  } catch (err) {
    msg.textContent = "error: " + err.message;
    msg.className = "status err";
  } finally {
    if (liveBtn) liveBtn.disabled = false;
    if (dryBtn) dryBtn.disabled = false;
  }
}

async function loadDraft(relpath){
  try {
    const res = await fetch("api/crm/draft/" + encodeURI(relpath));
    const data = await res.json();
    const block = document.getElementById("dDraftBlock");
    if (!block) return;
    if (!data.ok) { block.textContent = "ERROR: " + (data.error || "could not load"); return; }
    const d = data.draft;
    block.textContent =
      `Subject: ${d.subject||""}\n\n${d.body||""}` +
      (d.angle_used ? `\n\n[angle: ${d.angle_used}]` : "");
  } catch (err) {
    const block = document.getElementById("dDraftBlock");
    if (block) block.textContent = "ERROR: " + err.message;
  }
}

async function savePipeContact(id){
  const msg = document.getElementById("dStatusMsg");
  const btn = document.getElementById("dSave");
  msg.textContent = "saving…"; msg.className = "status"; btn.disabled = true;
  const tierVal = parseInt(document.getElementById("dTier").value, 10);
  const patch = {
    status: document.getElementById("dStatus").value,
    tier: isNaN(tierVal) ? null : tierVal,
    email: document.getElementById("dEmail").value.trim(),
    phone: document.getElementById("dPhone").value.trim(),
    linkedin: document.getElementById("dLinkedin").value.trim(),
    title: document.getElementById("dTitle").value.trim(),
    next_action: document.getElementById("dNextAction").value.trim(),
    next_action_date: document.getElementById("dNextDate").value || null,
    notes: document.getElementById("dNotes").value,
  };
  try {
    const res = await fetch("api/crm/contact/" + encodeURIComponent(id), {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify(patch),
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || "save failed");
    // Update local copy
    const idx = pipeContacts.findIndex(c => c.id === id);
    if (idx >= 0) pipeContacts[idx] = data.contact;
    renderPipeRows();
    msg.textContent = "saved"; msg.className = "status ok";
  } catch (err) {
    msg.textContent = "error: " + err.message; msg.className = "status err";
  } finally {
    btn.disabled = false;
  }
}
</script>
